<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<meta name="theme-color" content="#FFF8E7" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#2D1F14" media="(prefers-color-scheme: dark)" />
		<meta
			name="description"
			content="Tot or Not - The definitive ranking of potato-based dishes from around the world."
		/>

		<!-- Favicon -->
		<link rel="icon" href="/favicon.ico" sizes="48x48" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="/favicon-96x96.png" type="image/png" sizes="96x96" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />

		<title>Tot or Not</title>

		<!-- DNS prefetch for faster font loading -->
		<link rel="dns-prefetch" href="https://fonts.googleapis.com" />
		<link rel="dns-prefetch" href="https://fonts.gstatic.com" />

		<!-- Preconnect to font domains -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<!-- Inline critical font CSS to prevent FOIT -->
		<style>
			/* Critical CSS: System fonts as immediate fallback */
			:root {
				--font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				--font-serif: Georgia, 'Times New Roman', serif;
			}

			* {
				font-family: var(--font-sans);
			}

			.font-serif,
			[class*='font-serif'],
			[class*='neon-sign'] {
				font-family: var(--font-serif);
			}
		</style>

		<!-- Async font loading to prevent render blocking -->
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;0,800;0,900;1,600;1,700;1,800;1,900&display=swap"
			rel="preload"
			as="style"
			onload="
				this.rel = 'stylesheet';
				document.documentElement.classList.add('fonts-loaded');
			"
		/>
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;0,800;0,900;1,600;1,700;1,800;1,900&display=swap"
				rel="stylesheet"
			/>
		</noscript>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
