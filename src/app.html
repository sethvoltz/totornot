<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<meta name="theme-color" content="#FFF8E7" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#2D1F14" media="(prefers-color-scheme: dark)" />
		<meta
			name="description"
			content="Tater or Not - The definitive ranking of potato-based dishes from around the world."
		/>
		<title>Tater or Not</title>

		<!-- Preconnect to font domains -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<!-- Async font loading to prevent render blocking -->
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;0,800;0,900;1,600;1,700;1,800;1,900&display=swap"
			rel="preload"
			as="style"
			onload="this.rel = 'stylesheet'"
		/>
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;0,800;0,900;1,600;1,700;1,800;1,900&display=swap"
				rel="stylesheet"
			/>
		</noscript>

		<style>
			/* Critical CSS: Prevent layout shift while fonts load */
			:root {
				--font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				--font-serif: Georgia, 'Times New Roman', serif;
			}

			body {
				font-family: var(--font-sans);
			}

			.font-serif {
				font-family: var(--font-serif);
			}
		</style>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
